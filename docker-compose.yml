version: '3.8'

services:

  redis_node:
    image: redis:alpine
    ports:
      - "6379:6379"

  api_node:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "80:8000"
    env_file:
      - .env
    depends_on:
      - redis_node

  worker_node:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    depends_on:
      - redis_node